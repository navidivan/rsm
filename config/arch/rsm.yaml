

name: recursive_reasoning.rsm@RSM
loss:
  name: losses@LossHead
  loss_type: stablemax_cross_entropy

# RSM ignores this:
halt_exploration_prob: 0.1
halt_max_steps: 16

H_cycles: 3
L_cycles: 6

H_layers: 0
L_layers: 2

hidden_size: 512
num_heads: 8  # min(2, hidden_size // 64)
expansion: 4

puzzle_emb_ndim: ${.hidden_size}

pos_encodings: rope
forward_dtype: bfloat16

mlp_t: False # use mlp on L instead of transformer
puzzle_emb_len: 16 # if non-zero, its specified to this value
no_ACT_continue: True # No continue ACT loss, only use the sigmoid of the halt which makes much more sense

enable_alpha_blend: False
alpha_blend_mode: "H-1_H"
transition_lr_zero: False
transition_lr_ramp_steps: 0
